<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeleCorp — Diagramas de Flujo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --surface2: #1c2128;
    --border:   rgba(255,255,255,0.08);
    --text:     #e6edf3;
    --text2:    #8b949e;
    --text3:    #484f58;
    --accent:   #1f6feb;
    --teal:     #0e9f8e;
    --purple:   #7c3aed;
    --coral:    #da3633;
    --amber:    #d29922;
    --green:    #238636;
    --gray:     #30363d;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .logo { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }
  .logo-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.1em; margin-top: 2px; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 28px 0;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .tab {
    padding: 8px 16px;
    border-radius: 8px 8px 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text2);
    background: transparent;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    position: relative;
    bottom: -1px;
  }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.on {
    color: var(--text);
    background: var(--surface2);
    border-color: var(--border);
    border-bottom-color: var(--surface2);
  }

  /* ── LAYOUT ── */
  .layout { display: flex; height: calc(100vh - 113px); }
  .diagram-col { flex: 1; min-width: 0; overflow: auto; padding: 24px 28px; }
  .panel-col {
    width: 320px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    overflow: auto;
    transition: width 0.2s ease;
    background: var(--surface);
  }
  .panel-col.closed { width: 0; border-left: none; overflow: hidden; }
  .panel-inner { width: 320px; padding: 20px; }

  /* ── PANEL DETAIL ── */
  .panel-close {
    float: right;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
  }
  .panel-close:hover { color: var(--text); }
  .panel-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .panel-sub { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 16px; }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 14px 0 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .field-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 5px; font-size: 12.5px; color: var(--text2); line-height: 1.5; }
  .field-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 5px; }
  .badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    margin: 2px 3px 2px 0;
    font-weight: 500;
  }
  .badge-db   { background: rgba(31,111,235,0.15); color: #58a6ff; border: 1px solid rgba(31,111,235,0.3); }
  .badge-warn { background: rgba(210,153,34,0.15);  color: #e3b341; border: 1px solid rgba(210,153,34,0.3); }
  .badge-ok   { background: rgba(35,134,54,0.15);   color: #3fb950; border: 1px solid rgba(35,134,54,0.3); }
  .badge-err  { background: rgba(218,54,51,0.15);   color: #f85149; border: 1px solid rgba(218,54,51,0.3); }

  /* ── SVG NODES ── */
  .node { cursor: pointer; }
  .node rect, .node path { transition: filter 0.15s; }
  .node:hover rect, .node:hover path { filter: brightness(1.2); }
  .node text { pointer-events: none; font-family: 'Inter', sans-serif; }
  .th { font-weight: 600; fill: #e6edf3; font-size: 13px; }
  .ts { fill: #8b949e; font-size: 10px; }
  .arr { stroke: #484f58; fill: none; }

  /* Colores nodos */
  .c-gray   rect { fill: #30363d; stroke: #484f58; }
  .c-purple rect { fill: #1a1040; stroke: #7c3aed; }
  .c-blue   rect { fill: #0d1f40; stroke: #1f6feb; }
  .c-teal   rect { fill: #0a1f1c; stroke: #0e9f8e; }
  .c-coral  rect { fill: #2d0f0e; stroke: #da3633; }
  .c-amber  rect { fill: #2d1f00; stroke: #d29922; }
  .c-navy   rect { fill: #0d1117; stroke: #30363d; }
  .c-green  rect { fill: #0d1f12; stroke: #238636; }

  .node-label { fill: #8b949e; font-size: 9px; font-family: 'Inter',sans-serif; }

  /* ── HINT ── */
  .hint {
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    padding: 8px 0 16px;
    font-family: 'JetBrains Mono', monospace;
  }

  svg { display: block; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Tele<span>Corp</span></div>
    <div class="logo-sub">CENCOSUD · DIAGRAMAS DE FLUJO</div>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab on" onclick="setFlow('ciclo',this)">Ciclo equipo</button>
  <button class="tab" onclick="setFlow('login',this)">Login</button>
  <button class="tab" onclick="setFlow('linea',this)">Alta línea</button>
  <button class="tab" onclick="setFlow('gestion',this)">Nueva gestión</button>
  <button class="tab" onclick="setFlow('bajas',this)">Procesar bajas</button>
  <button class="tab" onclick="setFlow('devolucion',this)">Devolución</button>
</div>

<div class="layout">
  <div class="diagram-col">
    <div class="hint">Hacé clic en cualquier nodo para ver los detalles →</div>
    <div id="svg-container"></div>
  </div>
  <div class="panel-col closed" id="panel-col">
    <div class="panel-inner" id="panel-inner">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div class="panel-title" id="p-title"></div>
      <div class="panel-sub" id="p-sub"></div>
      <div id="p-body"></div>
    </div>
  </div>
</div>

function setFlow(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  closePanel();
  renderFlow(id);
}

function renderFlow(id) {
  const f = FLOWS[id];
  if (!f) return;
  let svg = `<svg width="100%" viewBox="${f.vb}" role="img">
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#484f58" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker></defs>`;

  f.arrows.forEach(a => {
    if (a.length === 4) {
      svg += `<line x1="${a[0]}" y1="${a[1]}" x2="${a[2]}" y2="${a[3]}" class="arr" marker-end="url(#arr)" stroke-width="1"/>`;
    } else {
      let d = 'M';
      for (let i = 0; i < a.length; i += 2) d += `${a[i]} ${a[i+1]}${i < a.length-2 ? 'L' : ''}`;
      svg += `<path d="${d}" fill="none" class="arr" marker-end="url(#arr)" stroke-width="1"/>`;
    }
  });

  (f.labels||[]).forEach(l => {
    svg += `<text class="node-label" x="${l.x}" y="${l.y}" text-anchor="middle" dominant-baseline="central">${l.text}</text>`;
  });

  f.nodes.forEach(n => {
    const cx = n.x + n.w/2, cy = n.y + n.h/2;
    const hasData = !!NODES[n.id];
    svg += `<g class="node ${n.cls}" onclick="${hasData ? `showPanel('${n.id}')` : ''}">
  <rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="${n.rx}" stroke-width="1"/>
  <text class="th" x="${cx}" y="${n.sub ? cy-8 : cy}" text-anchor="middle" dominant-baseline="central">${n.label}</text>
  ${n.sub ? `<text class="ts" x="${cx}" y="${cy+10}" text-anchor="middle" dominant-baseline="central">${n.sub}</text>` : ''}
</g>`;
  });

  svg += '</svg>';
  document.getElementById('svg-container').innerHTML = svg;
}

function showPanel(id) {
  const node = NODES[id];
  if (!node) return;
  document.getElementById('p-title').textContent = node.title;
  document.getElementById('p-sub').textContent   = node.sub;
  let html = '';
  node.sections.forEach(sec => {
    html += `<div class="section-label">${sec.label}</div>`;
    if (sec.badges) {
      sec.badges.forEach(b => {
        const cls = {db:'badge-db',warn:'badge-warn',ok:'badge-ok',err:'badge-err'}[b.c]||'badge-db';
        html += `<span class="badge ${cls}">${b.t}</span>`;
      });
      html += '<br style="margin-bottom:4px">';
    }
    if (sec.items) sec.items.forEach(item => {
      html += `<div class="field-row"><div class="field-dot"></div><div>${item}</div></div>`;
    });
  });
  document.getElementById('p-body').innerHTML = html;
  document.getElementById('panel-col').classList.remove('closed');
}

function closePanel() {
  document.getElementById('panel-col').classList.add('closed');
}

renderFlow('ciclo');
